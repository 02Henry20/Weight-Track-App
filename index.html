<!doctype html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="description" content="A local-first personal weight tracker">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./styles.css">

  <title>Weight Tracker</title>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">LOCAL WEIGHT LOG</p>
        <h1>Weight Tracker</h1>
      </div>
      <span class="version version-new">Version 2</span>
    </header>

    <section class="summary-grid" aria-label="Weight summary">
      <article class="summary-card">
        <span>Latest</span>
        <strong id="latest-weight">—</strong>
      </article>
      <article class="summary-card">
        <span>Average</span>
        <strong id="average-weight">—</strong>
      </article>
      <article class="summary-card">
        <span>Total change</span>
        <strong id="total-change">—</strong>
      </article>
    </section>

    <section class="card chart-card">
      <div class="section-heading">
        <h2>Progress</h2>
        <span class="new-feature">New in V2</span>
      </div>
      <div id="chart-empty" class="empty-state">Add at least two entries to see a trend.</div>
      <svg id="weight-chart" class="weight-chart" viewBox="0 0 600 220"
           role="img" aria-label="Weight trend chart" hidden></svg>
    </section>

    <section class="card">
      <form id="weight-form">
        <label for="weight">Weight in kilograms</label>
        <div class="weight-input-row">
          <input id="weight" name="weight" type="number" inputmode="decimal"
                 min="20" max="500" step="0.1" placeholder="72.0" required>
          <span>kg</span>
        </div>

        <label for="date">Date</label>
        <input id="date" name="date" type="date" required>

        <button type="submit">Save weight</button>
        <p id="form-message" class="message" aria-live="polite"></p>
      </form>
    </section>

    <section class="card">
      <div class="section-heading">
        <h2>Saved entries</h2>
        <span id="entry-count" class="muted">0 entries</span>
      </div>
      <div id="empty-state" class="empty-state">No weights saved yet.</div>
      <ol id="weight-list" class="weight-list"></ol>
    </section>

    <p class="storage-note">Version 2 reads the same local IndexedDB data created by Version 1.</p>
  </main>

  <aside id="update-banner" class="update-banner" hidden>
    <span>Version 2 is ready.</span>
    <button id="update-button" type="button">Update now</button>
  </aside>

  <script src="./app.js" defer></script>
</body>
</html>
