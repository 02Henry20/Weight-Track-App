<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="CalStat icon-pack integration example.">
  <!-- CalStat Scheme D icons -->
  <meta name="theme-color" content="#0B111A">
  <meta name="application-name" content="CalStat">
  <meta name="apple-mobile-web-app-title" content="CalStat">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="msapplication-TileColor" content="#0B111A">
  <meta name="msapplication-config" content="./browserconfig.xml">

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="./icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png">
  <link rel="shortcut icon" href="./icons/favicon.ico">
  <link rel="mask-icon" href="./icons/safari-pinned-tab.svg" color="#238DFF">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple/apple-touch-icon-180x180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="./icons/apple/apple-touch-icon-167x167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/apple/apple-touch-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="./icons/apple/apple-touch-icon-120x120.png">
  <title>CalStat</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; background:radial-gradient(circle at 50% 20%,#183a67,#0b111a 55%); color:#eef5ff; }
    main { text-align:center; padding:2rem; }
    img { width:min(280px,70vw); filter:drop-shadow(0 28px 45px rgba(0,0,0,.45)); }
    h1 { margin:.8rem 0 .3rem; } p { margin:0; color:#aebfd2; }
  </style>
</head>
<body>
  <main>
    <img src="./icons/icon-512.png" alt="CalStat Scheme D icon">
    <h1>CalStat</h1>
    <p>The browser tab, installed PWA, Apple and Android icons use Scheme D.</p>
  </main>
</body>
</html>
